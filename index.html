<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RideNow — Request a Ride</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=" />
</head>
<body>
  <!-- Landing screen -->
  <div id="landing">
    <div class="landing-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#1978c8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
        <path d="M2 12h20"/>
      </svg>
    </div>
    <h1>Where are you going?</h1>
    <p>We'll find your location and connect you with a nearby driver in seconds.</p>
    <button id="bookBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Find my location
    </button>
  </div>

  <!-- Top bar (visible after booking) -->
  <div id="topbar" class="hidden">
    <div class="topbar-left">
      <div class="topbar-brand">RideNow</div>
    </div>
    <div id="controls">
      <button id="locateBtn" title="Center map on your location">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
        Center on me
      </button>
    </div>
  </div>

  <!-- Map -->
  <div id="map" class="hidden"></div>

  <!-- Instruction banner (shown after map loads) -->
  <div id="mapHint" class="hidden" aria-live="polite">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    Tap anywhere on the map to set your destination
  </div>

  <!-- Status bar -->
  <div id="status" class="hidden" aria-live="polite"></div>

  <!-- Ride panel (route info + request button) -->
  <div id="ridePanel" class="hidden" role="region" aria-label="Ride details">
    <div id="rideInfo">
      <div id="rideDistance">— km</div>
      <div id="rideDuration">— min</div>
    </div>
    <div id="rideActions">
      <button id="requestBtn">Request ride</button>
      <button id="clearRouteBtn" title="Clear route">Clear</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
