<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>RideNow — Request a Ride</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=" />
</head>
<body>

  <!-- Landing screen -->
  <div id="landing">
    <div class="landing-card">
      <div class="landing-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
          <path d="M2 12h20"/>
        </svg>
      </div>
      <h1>RideNow</h1>
      <p>Tap below to find your location and request a ride in seconds.</p>
      <button id="bookBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Find my location
      </button>
    </div>
  </div>

  <!-- Full-screen map behind everything -->
  <div id="map" class="hidden"></div>

  <!-- Floating locate button -->
  <button id="locateBtn" class="fab-locate hidden" title="Center on my location">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
  </button>

  <!-- Instruction banner -->
  <div id="mapHint" class="hidden">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    Tap the map to set your destination
  </div>

  <!-- Status toast -->
  <div id="status" class="hidden" aria-live="polite"></div>

  <!-- Bottom sheet: ride panel -->
  <div id="ridePanel" class="hidden" role="region" aria-label="Ride details">
    <div class="ride-handle"></div>
    <div class="ride-header">
      <div class="ride-stats">
        <div class="ride-stat">
          <span class="ride-stat-value" id="rideDistance">—</span>
          <span class="ride-stat-label">km</span>
        </div>
        <div class="ride-stat-divider"></div>
        <div class="ride-stat">
          <span class="ride-stat-value" id="rideDuration">—</span>
          <span class="ride-stat-label">min</span>
        </div>
      </div>
    </div>
    <div class="ride-status" id="rideStatus"></div>
    <div class="ride-actions">
      <button id="requestBtn" class="ride-btn-primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Request Ride
      </button>
      <button id="clearRouteBtn" class="ride-btn-secondary">Clear</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
