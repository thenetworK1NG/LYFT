<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Location Map — Uber Prototype</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=" />
</head>
<body>
  <div id="landing">
    <h1>Book a lift</h1>
    <p>Quickly request a ride — we'll show your location on the map.</p>
    <button id="bookBtn">Book a lift</button>
  </div>

  <div id="topbar" class="hidden">
    <h1>Uber Prototype — Map</h1>
    <div id="controls">
      <button id="locateBtn">Center on me</button>
      <button id="trackBtn">Start tracking</button>
    </div>
  </div>

  <div id="map" class="hidden"></div>

  <div id="status" class="hidden" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
